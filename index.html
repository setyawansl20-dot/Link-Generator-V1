<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Generator</title>
    
    <!-- Link Penghubung ke Manifest PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Jembatan menuju Web App Google Anda -->
    <iframe src="https://tinyurl.com/L1nk-Generator"></iframe>

    <!-- Script Penghubung ke Service Worker PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('PWA Generator aktif!', reg))
            .catch(err => console.log('PWA gagal aktif', err));
        });
      }
    </script>
</body>
</html>
